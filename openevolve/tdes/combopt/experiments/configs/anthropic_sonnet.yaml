# TDES-CombOpt config using Anthropic Claude Sonnet 4.6 (OpenAI-compatible endpoint).
#   export ANTHROPIC_API_KEY=...
#   python -m openevolve.tdes.combopt.experiments.run_combopt \
#       --config openevolve/tdes/combopt/experiments/configs/anthropic_sonnet.yaml \
#       --problems mis maxcut --conditions tdes_full single_agent pass5 --seeds 0 1

tdes:
  pop_size: 4
  max_generations: 5
  window_size: 3
  diff_based: false
  sandbox: true            # exec LLM-written heuristics in an isolated subprocess
  suite_timeout: 120
  # Full per-candidate repair (fix every failing class each generation), so TDES
  # has the same repair throughput as the single-agent baseline plus a population
  # and crossover — a FAIR method comparison. The throttled one-class-per-gen
  # setting used to force complementary diversity lives in the crossover ablation.
  mutate_modules_per_candidate: null
  output_dir: tdes_combopt_results/runs
  random_seed: 42

llm:
  api_base: "https://api.anthropic.com/v1/"
  api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.9
  max_tokens: 8192
  timeout: 180
  retries: 3
  models:
    - name: "claude-sonnet-4-6"
      weight: 1.0
